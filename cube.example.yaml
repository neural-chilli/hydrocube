# cube.example.yaml
name: trading_positions
description: Real-time position aggregation by book

tables:
  - name: trades
    mode: append
    schema:
      columns:
        - { name: trade_id,        type: VARCHAR    }
        - { name: book,            type: VARCHAR    }
        - { name: desk,            type: VARCHAR    }
        - { name: instrument,      type: VARCHAR    }
        - { name: instrument_type, type: VARCHAR    }
        - { name: currency,        type: VARCHAR    }
        - { name: quantity,        type: DOUBLE     }
        - { name: price,           type: DOUBLE     }
        - { name: notional,        type: DOUBLE     }
        - { name: side,            type: VARCHAR    }
        - { name: trade_time,      type: TIMESTAMP  }

sources:
  - type: kafka
    table: trades
    brokers: ["localhost:9092"]
    topic: "trades.executed"
    group_id: "hydrocube-positions"
    format: json

aggregation:
  key_columns: [book, desk, instrument_type, currency]
  publish:
    sql: |
      SELECT
        book,
        desk,
        instrument_type,
        currency,
        SUM(notional) AS total_notional,
        SUM(CASE WHEN side = 'BUY' THEN quantity ELSE -quantity END) AS net_quantity,
        COUNT(*) AS trade_count,
        AVG(price) AS avg_price
      FROM trades
      WHERE _window_id > 0
      GROUP BY book, desk, instrument_type, currency

window:
  interval_ms: 1000

retention:
  raw:
    duration: 6d
    parquet_path: "/data/hydrocube/slices/"

persistence:
  enabled: true
  path: "/data/hydrocube/positions.db"
  flush_interval: 10

log_level: info
